<script>
(function(){
  const PEEP = 5;

  function pcvBreath(t, tStart, tEnd, peakP) {
    if (t < tStart || t > tEnd) return null;
    const dt = t - tStart, rise = 0.025;
    if (dt < rise) return PEEP + (peakP - PEEP) * (dt / rise);
    return peakP;
  }
  function pcvFlow(t, tStart, tEnd, peakFlow, tau) {
    if (t < tStart || t > tEnd) return null;
    return peakFlow * Math.exp(-(t - tStart) / tau);
  }
  function expFlow(t, tEnd, peakNeg, tau) {
    const dt = t - tEnd;
    if (dt < 0) return null;
    return peakNeg * Math.exp(-dt / tau);
  }
  function vcvBreath(t, tStart, tEnd, basePeak, compliance) {
    if (t < tStart || t > tEnd) return null;
    const dt = t - tStart, flowRise = 0.015, resistivePressure = 8;
    if (dt < flowRise) return PEEP + resistivePressure * (dt / flowRise);
    return PEEP + resistivePressure + compliance * (dt - flowRise);
  }

  const cases = {
    ineffective: {
      title: "Ineffective triggering",
      tagline: "Patient effort during expiration fails to trigger a machine breath.",
      mode: "PSV / AC",
      sev: "High prevalence", sevType: "danger",
      signs: [
        "Negative dip in airway pressure during expiration",
        "Simultaneous upward deflection in expiratory flow",
        "No machine breath delivered after the patient effort"
      ],
      mechanism: "Most commonly caused by intrinsic PEEP (auto-PEEP) in COPD: alveolar pressure exceeds the trigger threshold so the patient's inspiratory effort can't reach the trigger. Less often, set trigger sensitivity is simply too low.",
      actions: [
        "Reduce trigger threshold (more sensitive)",
        "Decrease respiratory rate or tidal volume to allow longer expiratory time",
        "Treat bronchospasm aggressively",
        "Add extrinsic PEEP to roughly 80% of measured auto-PEEP"
      ],
      pressure: t => {
        const breaths = [{s:0.05, e:0.22, peak:20}, {s:0.65, e:0.82, peak:20}];
        let v = PEEP;
        for(const b of breaths){ const p = pcvBreath(t, b.s, b.e, b.peak); if (p !== null) v = p; }

  const ORDER = ['ineffective','auto','double','reverse','trigDelay','flow','cycle','delayedCycle'];
  let current = "ineffective";
  const SVG_NS = "http://www.w3.org/2000/svg";

  let W = 800;
  const H = 130;
  const padL = 40, padR = 14, padT = 8, padB = 14;
  let plotW = W - padL - padR;
  const plotH = H - padT - padB;

  function updateDimensions() {
    const psvg = document.getElementById('dys-p');
    if (!psvg) return false;
    const newW = Math.max(400, Math.round(psvg.clientWidth || psvg.getBoundingClientRect().width));
    if (newW > 0 && newW !== W) { W = newW; plotW = W - padL - padR; return true; }
    return false;
  }

  const COL_GRID  = 'rgba(148,163,184,0.10)';
  const COL_REF   = 'rgba(148,163,184,0.32)';
  const COL_AXIS  = 'rgba(148,163,184,0.50)';
  const COL_PRESS = '#FFD23F';
  const COL_FLOW  = '#5EE5FF';
  const COL_ANN   = '#FF8A5C';
  const COL_ANN_BG = '#0F1D38';

  let animProgress = 0;
  let animRunning = true;
  let lastFrameTime = 0;
  const SWEEP_DURATION_MS = 6000;
  let curPressureFn = null, curFlowFn = null;

  function yFromValue(v, isFlow) {
    const yMin = isFlow ? -60 : 0, yMax = isFlow ? 60 : 40;
    return padT + plotH * (yMax - v) / (yMax - yMin);
  }

  function buildSparkline(fn, w, h) {
    const N = 80;
    const yMin = 0, yMax = 40;
    let path = '';
    for(let i=0; i<=N; i++){
      const t = i/N;
      const v = fn(t);
      const x = (i/N) * w;
      const y = h - h * (v - yMin) / (yMax - yMin);
      path += (i===0 ? "M" : "L") + x.toFixed(1) + "," + Math.max(1, Math.min(h-1, y)).toFixed(1) + " ";
    }
    return path;
  }

  function renderCaseButtons() {
    const container = document.getElementById('dys-cases');
    container.innerHTML = '';
    ORDER.forEach((key, idx) => {
      const c = cases[key];
      const num = String(idx + 1).padStart(2, '0');
      const sparkPath = buildSparkline(c.pressure, 100, 22);
      const sparkColor = c.sevType === 'danger' ? '#EF4444' : c.sevType === 'warning' ? '#F59E0B' : '#22C55E';
      const btn = document.createElement('button');
      btn.className = 'dys-case-btn' + (key === current ? ' active' : '');
      btn.dataset.case = key;
      btn.setAttribute('role', 'tab');
      btn.innerHTML = '<div class="dys-case-row1"><span class="dys-case-num">' + num + '</span><span class="dys-case-dot sev-dot-' + c.sevType + '"></span><span class="dys-case-name">' + c.title + '</span></div><svg class="dys-case-spark" viewBox="0 0 100 22" preserveAspectRatio="none" aria-hidden="true"><path d="' + sparkPath + '" stroke="' + sparkColor + '" stroke-width="1.2" fill="none" stroke-linejoin="round"/></svg>';
      btn.addEventListener('click', () => {
        current = key;
        document.querySelectorAll('.dys-case-btn').forEach(b => b.classList.toggle('active', b.dataset.case === key));
        render();
      });
      container.appendChild(btn);
    });
  }

  function draw(svgId, fn, isFlow, annotations) {
    const svg = document.getElementById(svgId);
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

    const yMin = isFlow ? -60 : 0, yMax = isFlow ? 60 : 40;
    const traceColor = isFlow ? COL_FLOW : COL_PRESS;

    const defs = document.createElementNS(SVG_NS, "defs");
    const clipPath = document.createElementNS(SVG_NS, "clipPath");
    const clipId = 'sweep-clip-' + svgId;
    clipPath.setAttribute("id", clipId);
    const leftRect = document.createElementNS(SVG_NS, "rect");
    leftRect.setAttribute("class", "sweep-clip-left");
    leftRect.setAttribute("x", padL); leftRect.setAttribute("y", 0);
    leftRect.setAttribute("width", 0); leftRect.setAttribute("height", H);
    clipPath.appendChild(leftRect);
    const rightRect = document.createElementNS(SVG_NS, "rect");
    rightRect.setAttribute("class", "sweep-clip-right");
    rightRect.setAttribute("x", W - padR); rightRect.setAttribute("y", 0);
    rightRect.setAttribute("width", 0); rightRect.setAttribute("height", H);
    clipPath.appendChild(rightRect);
    defs.appendChild(clipPath);
    svg.appendChild(defs);

    for(let i=0; i<=4; i++){
      if(isFlow && i === 2) continue;
      const y = padT + (plotH * i / 4);
      const line = document.createElementNS(SVG_NS, "line");
      line.setAttribute("x1", padL); line.setAttribute("x2", W-padR);
      line.setAttribute("y1", y); line.setAttribute("y2", y);
      line.setAttribute("stroke", COL_GRID); line.setAttribute("stroke-width", "0.5");
      svg.appendChild(line);
    }

    if(isFlow){
      const zeroY = padT + plotH * (yMax - 0) / (yMax - yMin);
      const zline = document.createElementNS(SVG_NS, "line");
      zline.setAttribute("x1", padL); zline.setAttribute("x2", W-padR);
      zline.setAttribute("y1", zeroY); zline.setAttribute("y2", zeroY);
      zline.setAttribute("stroke", COL_REF); zline.setAttribute("stroke-width", "0.5");
      zline.setAttribute("stroke-dasharray", "3,3");
      svg.appendChild(zline);
    } else {
      const peepY = padT + plotH * (yMax - PEEP) / (yMax - yMin);
      const pline = document.createElementNS(SVG_NS, "line");
      pline.setAttribute("x1", padL); pline.setAttribute("x2", W-padR);
      pline.setAttribute("y1", peepY); pline.setAttribute("y2", peepY);
      pline.setAttribute("stroke", COL_REF); pline.setAttribute("stroke-width", "0.5");
      pline.setAttribute("stroke-dasharray", "3,3");
      svg.appendChild(pline);
      const peepLabel = document.createElementNS(SVG_NS, "text");
      peepLabel.setAttribute("x", W - padR - 4); peepLabel.setAttribute("y", peepY - 3);
      peepLabel.setAttribute("text-anchor", "end"); peepLabel.setAttribute("fill", COL_AXIS);
      peepLabel.setAttribute("font-size", "9"); peepLabel.setAttribute("font-family", "ui-monospace, monospace");
      peepLabel.setAttribute("font-weight", "600"); peepLabel.setAttribute("letter-spacing", "0.5");
      peepLabel.textContent = "PEEP";
      svg.appendChild(peepLabel);
    }

    const labels = isFlow ? [60, 30, 0, -30, -60] : [40, 30, 20, 10, 0];
    labels.forEach((val, i) => {
      const y = padT + (plotH * i / 4);
      const text = document.createElementNS(SVG_NS, "text");
      text.setAttribute("x", padL - 6); text.setAttribute("y", y + 3.5);
      text.setAttribute("text-anchor", "end"); text.setAttribute("fill", COL_AXIS);
      text.setAttribute("font-size", "10"); text.setAttribute("font-family", "ui-monospace, monospace");
      text.setAttribute("font-variant-numeric", "tabular-nums"); text.textContent = val;
      svg.appendChild(text);
    });

    const clippedGroup = document.createElementNS(SVG_NS, "g");
    clippedGroup.setAttribute("clip-path", "url(#" + clipId + ")");

    let path = "";
    const samples = 600;
    for(let i=0; i<=samples; i++){
      const t = i/samples;
      const v = fn(t);
      const x = padL + (t * plotW);
      const y = padT + plotH * (yMax - v) / (yMax - yMin);
      path += (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1) + " ";
    }
    const glow = document.createElementNS(SVG_NS, "path");
    glow.setAttribute("d", path); glow.setAttribute("stroke", traceColor);
    glow.setAttribute("stroke-width", "4"); glow.setAttribute("fill", "none");
    glow.setAttribute("stroke-linejoin", "round"); glow.setAttribute("opacity", "0.18");
    glow.setAttribute("filter", "blur(0.5px)");
    clippedGroup.appendChild(glow);

    const pathEl = document.createElementNS(SVG_NS, "path");
    pathEl.setAttribute("d", path); pathEl.setAttribute("stroke", traceColor);
    pathEl.setAttribute("stroke-width", "1.5"); pathEl.setAttribute("fill", "none");
    pathEl.setAttribute("stroke-linejoin", "round");
    clippedGroup.appendChild(pathEl);

    if(annotations){
      annotations.filter(a => (isFlow && a.type === "f") || (!isFlow && a.type === "p")).forEach(a => {
        const t = a.tNorm, v = fn(t);
        const x = padL + (t * plotW);
        const y = padT + plotH * (yMax - v) / (yMax - yMin);
        const circle = document.createElementNS(SVG_NS, "circle");
        circle.setAttribute("cx", x); circle.setAttribute("cy", y);
        circle.setAttribute("r", "5"); circle.setAttribute("fill", "none");
        circle.setAttribute("stroke", COL_ANN); circle.setAttribute("stroke-width", "1.5");
        clippedGroup.appendChild(circle);

        const labelX = x + a.offsetX + 8, labelY = y + a.offsetY;
        const leader = document.createElementNS(SVG_NS, "line");
        leader.setAttribute("x1", x + (a.offsetX > 0 ? 5 : -5));
        leader.setAttribute("y1", y + (a.offsetY > 0 ? 5 : -5));
        leader.setAttribute("x2", labelX - 2); leader.setAttribute("y2", labelY - 3);
        leader.setAttribute("stroke", COL_ANN); leader.setAttribute("stroke-width", "0.7");
        leader.setAttribute("stroke-dasharray", "2,2");
        clippedGroup.appendChild(leader);

        const tempText = document.createElementNS(SVG_NS, "text");
        tempText.setAttribute("font-size", "10.5");
        tempText.setAttribute("font-family", "var(--font-sans, sans-serif)");
        tempText.setAttribute("font-weight", "600");
        tempText.style.visibility = "hidden"; tempText.textContent = a.label;
        svg.appendChild(tempText);
        const bbox = tempText.getBBox(); svg.removeChild(tempText);

        const bg = document.createElementNS(SVG_NS, "rect");
        bg.setAttribute("x", labelX - 4); bg.setAttribute("y", labelY - bbox.height + 1);
        bg.setAttribute("width", bbox.width + 8); bg.setAttribute("height", bbox.height + 3);
        bg.setAttribute("rx", "3"); bg.setAttribute("fill", COL_ANN_BG); bg.setAttribute("opacity", "0.85");
        clippedGroup.appendChild(bg);

        const label = document.createElementNS(SVG_NS, "text");
        label.setAttribute("x", labelX); label.setAttribute("y", labelY);
        label.setAttribute("fill", COL_ANN); label.setAttribute("font-size", "10.5");
        label.setAttribute("font-family", "var(--font-sans, sans-serif)");
        label.setAttribute("font-weight", "600"); label.textContent = a.label;
        clippedGroup.appendChild(label);
      });
    }
    svg.appendChild(clippedGroup);

    const cursorGlow = document.createElementNS(SVG_NS, "line");
    cursorGlow.setAttribute("class", "sweep-cursor-glow");
    cursorGlow.setAttribute("x1", padL); cursorGlow.setAttribute("x2", padL);
    cursorGlow.setAttribute("y1", padT); cursorGlow.setAttribute("y2", H - padB);
    cursorGlow.setAttribute("stroke", traceColor); cursorGlow.setAttribute("stroke-width", "5");
    cursorGlow.setAttribute("opacity", "0.15");
    svg.appendChild(cursorGlow);
    const cursor = document.createElementNS(SVG_NS, "line");
    cursor.setAttribute("class", "sweep-cursor");
    cursor.setAttribute("x1", padL); cursor.setAttribute("x2", padL);
    cursor.setAttribute("y1", padT); cursor.setAttribute("y2", H - padB);
    cursor.setAttribute("stroke", traceColor); cursor.setAttribute("stroke-width", "1");
    cursor.setAttribute("opacity", "0.55");
    svg.appendChild(cursor);

    const dotHalo = document.createElementNS(SVG_NS, "circle");
    dotHalo.setAttribute("class", "sweep-dot-halo");
    dotHalo.setAttribute("cx", padL); dotHalo.setAttribute("cy", yFromValue(fn(0), isFlow));
    dotHalo.setAttribute("r", "7"); dotHalo.setAttribute("fill", traceColor);
    dotHalo.setAttribute("opacity", "0.18");
    svg.appendChild(dotHalo);
    const dot = document.createElementNS(SVG_NS, "circle");
    dot.setAttribute("class", "sweep-dot");
    dot.setAttribute("cx", padL); dot.setAttribute("cy", yFromValue(fn(0), isFlow));
    dot.setAttribute("r", "3"); dot.setAttribute("fill", traceColor);
    svg.appendChild(dot);

    applySweep(svg, fn, isFlow);
  }

  function applySweep(svg, fn, isFlow) {
    const cursorX = padL + animProgress * plotW;
    const eraseW = plotW * 0.04;
    const eraseRight = Math.min(cursorX + eraseW, W - padR);

    const leftRect = svg.querySelector('.sweep-clip-left');
    const rightRect = svg.querySelector('.sweep-clip-right');
    const cursor = svg.querySelector('.sweep-cursor');
    const cursorGlow = svg.querySelector('.sweep-cursor-glow');
    const dot = svg.querySelector('.sweep-dot');
    const dotHalo = svg.querySelector('.sweep-dot-halo');

    if (leftRect)  leftRect.setAttribute('width', Math.max(0, cursorX - padL));
    if (rightRect) { rightRect.setAttribute('x', eraseRight); rightRect.setAttribute('width', Math.max(0, W - padR - eraseRight)); }
    if (cursor)      { cursor.setAttribute('x1', cursorX); cursor.setAttribute('x2', cursorX); }
    if (cursorGlow)  { cursorGlow.setAttribute('x1', cursorX); cursorGlow.setAttribute('x2', cursorX); }
    if (dot && fn) {
      const v = fn(animProgress), cy = yFromValue(v, isFlow);
      dot.setAttribute('cx', cursorX); dot.setAttribute('cy', cy);
      if (dotHalo) { dotHalo.setAttribute('cx', cursorX); dotHalo.setAttribute('cy', cy); }
    }
  }

  function updateReadouts() {
    if (!curPressureFn || !curFlowFn) return;
    const pVal = curPressureFn(animProgress), fVal = curFlowFn(animProgress);
    const pEl = document.getElementById('dys-readout-p');
    const fEl = document.getElementById('dys-readout-f');
    if (pEl) pEl.textContent = pVal.toFixed(1);
    if (fEl) fEl.textContent = (fVal >= 0 ? '+' : '') + fVal.toFixed(0);
  }

  function tick(now) {
    if (lastFrameTime === 0) lastFrameTime = now;
    const dt = now - lastFrameTime; lastFrameTime = now;
    if (animRunning) {
      animProgress = (animProgress + dt / SWEEP_DURATION_MS) % 1;
      const pSvg = document.getElementById('dys-p');
      const fSvg = document.getElementById('dys-f');
      if (pSvg && curPressureFn) applySweep(pSvg, curPressureFn, false);
      if (fSvg && curFlowFn)     applySweep(fSvg, curFlowFn,     true);
      updateReadouts();
    }
    requestAnimationFrame(tick);
  }

  function render() {
    const c = cases[current];
    document.getElementById("dys-titletext").textContent = c.title;
    document.getElementById("dys-tagline").textContent = c.tagline;
    const sevPill = document.getElementById("dys-sev");
    const sevText = document.getElementById("dys-sev-text");
    sevText.textContent = c.sev;
    sevPill.className = 'dys-sev-pill sev-pill-' + c.sevType;
    document.getElementById("dys-mode").textContent = c.mode;

    const signsList = document.getElementById('dys-signs');
    signsList.innerHTML = '';
    c.signs.forEach(s => { const li = document.createElement('li'); li.textContent = s; signsList.appendChild(li); });

    document.getElementById('dys-mechanism').textContent = c.mechanism;

    const actionsList = document.getElementById('dys-actions');
    actionsList.innerHTML = '';
    c.actions.forEach(a => { const li = document.createElement('li'); li.textContent = a; actionsList.appendChild(li); });

    curPressureFn = c.pressure; curFlowFn = c.flow;
    draw("dys-p", c.pressure, false, c.ann);
    draw("dys-f", c.flow, true, c.ann);
    updateReadouts();
  }

  // Theme toggle (default to system preference if dark)
  const appEl = document.querySelector('.dys-app');
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    appEl.setAttribute('data-dys-theme', 'dark');
  }
  function setTheme(theme) {
    appEl.setAttribute('data-dys-theme', theme);
    const isDark = theme === 'dark';
    const iconEl = document.getElementById('dys-theme-icon');
    if (isDark) {
      iconEl.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
    } else {
      iconEl.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
    const btn = document.getElementById('dys-theme');
    btn.setAttribute('aria-label', 'Switch to ' + (isDark ? 'light' : 'dark') + ' theme');
    btn.setAttribute('title', 'Switch to ' + (isDark ? 'light' : 'dark') + ' theme');
  }
  setTheme(appEl.getAttribute('data-dys-theme'));
  document.getElementById('dys-theme').addEventListener('click', () => {
    const cur = appEl.getAttribute('data-dys-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });

  function setPlayState(running) {
    animRunning = running;
    const iconEl = document.getElementById('dys-playpause-icon');
    if (running) {
      iconEl.innerHTML = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
    } else {
      iconEl.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
    const btn = document.getElementById("dys-playpause");
    btn.setAttribute('aria-label', running ? 'Pause' : 'Play');
    btn.setAttribute('title', running ? 'Pause' : 'Play');
    const recDot = document.getElementById('dys-recdot');
    const recStatus = document.getElementById('dys-recstatus');
    const liveDot = document.getElementById('dys-livedot');
    if (recDot) recDot.classList.toggle('paused', !running);
    if (recStatus) recStatus.textContent = running ? 'Live' : 'Paused';
    if (liveDot) liveDot.classList.toggle('paused', !running);
  }
  document.getElementById("dys-playpause").addEventListener("click", () => setPlayState(!animRunning));

  renderCaseButtons();
  render();
  requestAnimationFrame(tick);

  const psvgForObserver = document.getElementById('dys-p');
  if (psvgForObserver && typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => { if (updateDimensions()) render(); });
    ro.observe(psvgForObserver);
  } else {
    window.addEventListener('resize', () => { if (updateDimensions()) render(); });
  }
})();
</script>
<script>
// Height-sync for iframe embedding — posts document height to parent so the
// embedding page can size the iframe to fit content exactly. No-op when this
// page is loaded standalone (window.parent === window).
(function(){
  function postHeight() {
    try {
      const h = Math.max(
        document.documentElement.scrollHeight,
        document.body ? document.body.scrollHeight : 0,
        document.body ? document.body.offsetHeight : 0
      );
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'dys-explorer-height', height: h }, '*');
      }
    } catch (e) {}
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  if (typeof ResizeObserver !== 'undefined' && document.body) {
    const ro = new ResizeObserver(postHeight);
    ro.observe(document.body);
  }
  // Catch later layout shifts (font loading, case-button rendering, theme change)
  setTimeout(postHeight, 100);
  setTimeout(postHeight, 500);
  setTimeout(postHeight, 1500);
})();
</script>
