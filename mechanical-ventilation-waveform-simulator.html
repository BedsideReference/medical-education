    // ===== ENGINE =====
/**
 * Ventilator simulation engine — pure functions only.
 * No React, no DOM. Imported by the rendering component (vent-waveforms.jsx)
 * and exercised directly by the test suite (vent-engine.test.js).
 *
 * Equation of motion:  P_aw(t) = V(t)/C + Flow(t)·R + PEEP

const CONSTANTS = {
  SAMPLE_DT: 0.01,             // simulation timestep (sec) — 100 Hz
  WINDOW_SEC: 6,               // visible time window in plots
  TRENDS_LEN: 30,              // breaths held in the trends sparklines
  HOLD_DURATION_SEC: 2,        // duration of inspiratory/expiratory hold
  // Trigger detection (sec)
  TRIG_PRESSURE_MIN: 0.06,
  TRIG_PRESSURE_MAX: 0.22,
  TRIG_FLOW_MIN: 0.05,
  TRIG_FLOW_MAX: 0.18,
  TRIG_AUTOTRACK_FIXED: 0.07,
  // Patient effort magnitudes
  PRESSURE_TRIG_BASE_DIP: 1.5,    // cmH2O baseline dip for pressure trigger
  PRESSURE_TRIG_DIP_PER_SENS: 0.15,
  FLOW_TRIG_PRESSURE_DIP: 0.4,    // cmH2O — small, just to show effort
  AUTOTRACK_BASE_DIP: 0.8,
  AUTOTRACK_DIP_PER_SENS: 0.05,
  // CPAP modeling
  CPAP_EFFORT_PRESSURE: 6,      // cmH2O peak inspiratory muscle effort
  CPAP_COMPENSATION_GAP: 1.5,   // imperfect blower compensation, cmH2O
  CPAP_EXP_RISE: 1.0,           // expiratory pressure rise, cmH2O
  // APRV
  APRV_SPONT_FREQ_HZ: 0.4,      // 24/min spontaneous breath ripple during P-high
  APRV_SPONT_RIPPLE_MAG: 0.6,   // cmH2O ripple amplitude
  // Pathology mechanics overrides
  ARDS_COMPLIANCE: 0.025,
  COPD_RESISTANCE: 25,
  OBSTRUCTIVE_RESISTANCE: 30,
  RESTRICTIVE_COMPLIANCE: 0.020,
  // Alarm thresholds
  PIP_ALARM: 35,                // cmH2O
  PPLAT_ALARM: 30,
  DRIVING_P_ALARM: 15,

// ---------- Patient trigger helpers ----------
// Returns the duration (in seconds) of the trigger detection phase.
function getTriggerDuration(trigSens, triggerType = "pressure") {
  if (triggerType === "autotrack") return CONSTANTS.TRIG_AUTOTRACK_FIXED;
  if (triggerType === "flow") {
    const t = CONSTANTS.TRIG_FLOW_MIN + ((trigSens - 0.5) / 9.5) * (CONSTANTS.TRIG_FLOW_MAX - CONSTANTS.TRIG_FLOW_MIN);
    return Math.max(CONSTANTS.TRIG_FLOW_MIN, Math.min(CONSTANTS.TRIG_FLOW_MAX, t));
  }
  // Pressure trigger
  const t = CONSTANTS.TRIG_PRESSURE_MIN + ((trigSens - 0.5) / 9.5) * (CONSTANTS.TRIG_PRESSURE_MAX - CONSTANTS.TRIG_PRESSURE_MIN);

// Returns {dipP, dipFlow} signature of the patient's pre-trigger effort.
function patientTriggerEffort(t, tTrig, PEEP, sensitivity, triggerType = "pressure") {
  const progress = t / tTrig;
  if (triggerType === "flow") {
    return {
      dipP: -CONSTANTS.FLOW_TRIG_PRESSURE_DIP * progress,
      dipFlow: sensitivity * progress,
    };
  }
  if (triggerType === "autotrack") {
    const env = Math.sin(Math.PI * progress) * 0.7;
    return {
      dipP: -(CONSTANTS.AUTOTRACK_BASE_DIP + sensitivity * CONSTANTS.AUTOTRACK_DIP_PER_SENS) * env,
      dipFlow: -1.5 * env,

  // Pressure trigger (default)
  const effortP = CONSTANTS.PRESSURE_TRIG_BASE_DIP + sensitivity * CONSTANTS.PRESSURE_TRIG_DIP_PER_SENS;
  return {

    dipFlow: -3 * progress,

// ---------- Pathology mechanics ----------
function applyPathologyMechanics(C, R, pathology) {

  // displayed values always match what the sim uses. ARDS/COPD presets are
  // applied by pushing values INTO the sliders (see the pathology useEffect in
  // the component) rather than silently overriding them here.
  return { Ceff: C, Reff: R };
}
// ---------- Per-mode step functions ----------
// Each takes (s, sim, dt, Ceff, Reff) and returns { pressure, flow }.

// These are *pure* in the sense that they only depend on sim state and settings —
// no React, no DOM, no time outside `dt` and `sim.cycleT`.
function stepVC(s, sim, dt, Ceff, Reff) {
  const VtL = s.Vt / 1000;
  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    flow = VtL / s.ITime;
    sim.volume += flow * dt;
  } else {
    const tau = Reff * Ceff;
    const tExp = sim.cycleT - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;

function stepPC_PRVC(s, sim, dt, Ceff, Reff) {

  } else {
    drivingP = s.PIP - s.PEEP;

  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    const rise = Math.min(1, sim.cycleT / s.riseTime);
    const targetP = s.PEEP + drivingP * rise;
    flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
    sim.volume += flow * dt;
    pressure = targetP;
  } else {
    const tExp = sim.cycleT - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;

}
function stepPS(s, sim, dt, Ceff, Reff) {

  const tTrig = getTriggerDuration(s.trigSens, s.triggerType);
  let flow, pressure;
  if (sim.cycleT < tTrig) {
    const { dipP, dipFlow } = patientTriggerEffort(sim.cycleT, tTrig, s.PEEP, s.trigSens, s.triggerType);

    flow = dipFlow / 60;

    const tInsp = sim.cycleT - tTrig;
    const peakFlowExpected = drivingP / Reff;
    const cycleOffFlow = peakFlowExpected * cyclePct;

      sim.psInspActive = true;
      sim.expStartV = 0;

    if (sim.psInspActive) {
      const rise = Math.min(1, tInsp / s.riseTime);
      const targetP = s.PEEP + drivingP * rise;
      flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
      sim.volume += flow * dt;
      pressure = targetP;
      if (rise >= 1 && flow <= cycleOffFlow) {
        sim.psInspActive = false;
        sim.expStartV = sim.volume;
        sim.psExpStartT = sim.cycleT;
      }

      const tExp = sim.cycleT - sim.psExpStartT;
      sim.volume = sim.expStartV * Math.exp(-tExp / tau);
      flow = -sim.volume / tau;
      pressure = sim.volume / Ceff + flow * Reff + s.PEEP;

  return { pressure, flow };
}
function stepCPAP(s, sim, dt, Ceff, Reff) {
  const tau = Reff * Ceff;
  const cycle = 60 / s.RR;
  const tTrig = getTriggerDuration(s.trigSens, s.triggerType);
  const inInsp = sim.cycleT <= s.ITime;
  let flow, pressure;
  if (inInsp) {
    const phase = (sim.cycleT / s.ITime) * Math.PI;
    const muscleP = -CONSTANTS.CPAP_EFFORT_PRESSURE * Math.sin(phase);
    flow = (s.PEEP - muscleP - sim.volume / Ceff) / Reff;
    sim.volume += flow * dt;
    pressure = s.PEEP + (muscleP / CONSTANTS.CPAP_EFFORT_PRESSURE) * CONSTANTS.CPAP_COMPENSATION_GAP;
    if (sim.cycleT < tTrig) {
      const prog = sim.cycleT / tTrig;
      const triggerDip = -(CONSTANTS.PRESSURE_TRIG_BASE_DIP + s.trigSens * CONSTANTS.PRESSURE_TRIG_DIP_PER_SENS) * Math.sin(Math.PI * prog);
      pressure += triggerDip;
    }
  } else {
    const tExp = sim.cycleT - s.ITime;
    const eTime = cycle - s.ITime;
    if (tExp < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = sim.expStartV * Math.exp(-tExp / tau);
    flow = -sim.volume / tau;
    const phase = (tExp / eTime) * Math.PI;
    pressure = s.PEEP + CONSTANTS.CPAP_EXP_RISE * Math.sin(phase);

}
function stepAPRV(s, sim, dt, Ceff, Reff) {

  const Plow = s.aprvPlow;
  const Thigh = s.aprvThigh;
  const Tlow = s.aprvTlow;
  const aprvCycle = Thigh + Tlow;
  sim.aprvPhase = (sim.aprvPhase + dt) % aprvCycle;
  const tau = Reff * Ceff;
  const Vlow_eq = Ceff * Plow;
  let flow, pressure;
  if (sim.aprvPhase < Thigh) {
    const inP = sim.aprvPhase;
    const sp = 2 * Math.PI * CONSTANTS.APRV_SPONT_FREQ_HZ * inP;
    const spontRipple = s.aprvSpontEnabled ? CONSTANTS.APRV_SPONT_RIPPLE_MAG * Math.sin(sp) : 0;
    const targetP = Phigh + spontRipple;
    flow = (targetP - sim.volume / Ceff) / Reff;
    sim.volume += flow * dt;
    pressure = targetP;
  } else {
    const inR = sim.aprvPhase - Thigh;
    if (inR < dt * 1.5) sim.expStartV = sim.volume;
    sim.volume = Vlow_eq + (sim.expStartV - Vlow_eq) * Math.exp(-inR / tau);
    flow = -(sim.volume - Vlow_eq) / tau;
    pressure = sim.volume / Ceff + flow * Reff;
  }
  return { pressure, flow };
}
function stepSIMV(s, sim, dt, Ceff, Reff) {

  const tau = Reff * Ceff;

    // Mandatory breath
    const mandT = sim.simvT;
    const inMandInsp = mandT <= s.ITime;
    if (baseMode === "VC") {
      if (inMandInsp) {
        flow = (s.Vt / 1000) / s.ITime;
        sim.volume += flow * dt;
      } else {
        if (mandT - s.ITime < dt * 1.5) sim.expStartV = sim.volume;
        sim.volume = sim.expStartV * Math.exp(-(mandT - s.ITime) / tau);
        flow = -sim.volume / tau;
      }
      pressure = sim.volume / Ceff + flow * Reff + s.PEEP;
    } else {
      const drivingP = s.PIP - s.PEEP;
      if (inMandInsp) {
        const rise = Math.min(1, mandT / s.riseTime);
        const targetP = s.PEEP + drivingP * rise;
        flow = (targetP - sim.volume / Ceff - s.PEEP) / Reff;
        sim.volume += flow * dt;
        pressure = targetP;
      } else {
        if (mandT - s.ITime < dt * 1.5) sim.expStartV = sim.volume;
        sim.volume = sim.expStartV * Math.exp(-(mandT - s.ITime) / tau);
        flow = -sim.volume / tau;
        pressure = sim.volume / Ceff + flow * Reff + s.PEEP;

    const tTrig = getTriggerDuration(s.trigSens, s.triggerType);

      const { dipP, dipFlow } = patientTriggerEffort(psT, tTrig, s.PEEP, s.trigSens, s.triggerType);

      flow = dipFlow / 60;

      const tInsp = psT - tTrig;

const MODE_STEPPERS = {

  PRVC: stepPC_PRVC,
  PS: stepPS,
  CPAP: stepCPAP,
  APRV: stepAPRV,
  "SIMV-VC": stepSIMV,
  "SIMV-PC": stepSIMV,

// ---------- Pathology overlay ----------
// Applies after the mode step. Mutates pressure/flow in place (returns new values).
function applyPathologyOverlay(s, sim, pressure, flow, Ceff, Reff) {
  const cycle = 60 / s.RR;
  const inInsp = sim.cycleT <= s.ITime;
  const eTime = cycle - s.ITime;
  const tExp = sim.cycleT - s.ITime;
  switch (s.pathology) {
    case "autoPEEP": {
      // Incomplete exhalation: the lung empties toward a NON-ZERO trapped volume
      // rather than back to FRC. This (a) makes end-expiratory flow visibly fail
      // to return to zero AND (b) leaves real trapped gas in the lung, so an
      // expiratory hold now reveals elevated total PEEP (auto-PEEP = Vtrap / C).
      // Expiration in the mode steppers is recomputed (not integrated) each
      // sample, so overriding sim.volume here is stable across frames.
      if (!inInsp) {
        const tau = Reff * Ceff;
        const VtL = s.Vt / 1000;

        // ~3 time constants; the shorter the expiratory time relative to 3τ, the more
        // gas is trapped. A small floor keeps the scenario demonstrative, but raising
        // RR / shortening Te now visibly worsens auto-PEEP and lengthening Te relieves

      break;

            flow += 0.12 * env;

          flow += 0.02 * Math.sin(2 * Math.PI * 3 * tExp);

  RR: "Respiratory rate — set breaths per minute. Typical 12–20 in adults; up to 30+ in ARDS to maintain minute ventilation at low Vt.",
  ITime: "Inspiratory time — duration of inspiration in seconds. Combined with RR sets I:E ratio. Typical 0.8–1.2s; longer in obstructive disease.",
  PEEP: "Positive end-expiratory pressure. Prevents alveolar collapse. Typical 5–8; higher in moderate-severe ARDS (10–20).",
  PIP: "Peak inspiratory pressure setpoint (PC/PS modes). Typical 15–30 cmH₂O. Alarm above 35.",
  riseTime: "Time for airway pressure to ramp from PEEP to PIP at start of inspiration. Faster (<0.1s) feels aggressive; slower (>0.3s) more comfortable for awake patients.",
  flowCyclePct: "Pressure support cycle-off threshold. Inspiration ends when flow drops to this % of peak. Typical 25%; lower in obstructive disease, higher in restrictive.",
  trigSens: "Trigger sensitivity. Lower = more sensitive (machine responds to smaller patient effort). Too low → auto-triggering; too high → missed triggers.",
  FiO2: "Fraction of inspired oxygen, 21–100%. Target the lowest FiO₂ that maintains SpO₂ 88–95% in ARDS.",
  C: "Static compliance — change in lung volume per change in pressure. Normal ≈ 50–100 mL/cmH₂O. ARDS <30, severe ARDS <20.",
  R: "Airway resistance — pressure drop per unit flow through airways. Normal ≈ 5–10 cmH₂O/L/s. COPD/asthma >20.",
  aprvPhigh: "P-high — sustained inflation pressure during APRV. Typical 25–35 cmH₂O. Set to estimated end-inspiratory pressure of conventional ventilation.",
  aprvPlow: "P-low — release pressure. Typically set to 0 (zero PEEP) in true APRV; brief duration prevents derecruitment.",
  aprvThigh: "T-high — duration of P-high phase. Typical 4–6s in adults; longer phases improve recruitment but reduce CO₂ clearance.",
  aprvTlow: "T-low — release duration. Typically a short 0.5–0.8s, set so expiratory flow terminates at ~50–75% of peak (limits derecruitment by preventing full exhalation).",
};
// ---------- Tooltip component ----------
function InfoIcon({ tooltip, theme }) {
  const [show, setShow] = useState(false);
  if (!tooltip) return null;
  return (
    <span className="relative inline-flex items-center" style={{ marginLeft: 5, marginRight: 1 }}>
      <button
        type="button"
        onMouseEnter={() => setShow(true)}
        onMouseLeave={() => setShow(false)}
        onClick={() => setShow((v) => !v)}
        onFocus={() => setShow(true)}
        onBlur={() => setShow(false)}
        aria-label="Help"
        className="shrink-0"
        style={{
          width: 15, height: 15, borderRadius: "50%",
          border: `1px solid ${theme.textFaint}`,
          color: theme.textMuted,
          background: "transparent",
          cursor: "help",
          padding: 0,
          fontSize: 10,
          fontWeight: 700,
          lineHeight: "13px",        // box height minus borders → vertically centers the glyph
          textAlign: "center",
          fontFamily: "var(--font-body)",
        }}
      >
        ?
      </button>
      {show && (
        <span
          role="tooltip"
          className="absolute z-50 text-[11px] leading-snug pointer-events-none"
          style={{
            bottom: "calc(100% + 6px)",
            left: "50%",
            transform: "translateX(-50%)",
            width: 260,
            maxWidth: "60vw",
            padding: "8px 10px",
            background: theme.surface,
            color: theme.text,
            border: `1px solid ${theme.border}`,
            borderRadius: 4,
            boxShadow: "0 4px 12px rgba(0,0,0,0.35)",
            fontFamily: "ui-sans-serif, system-ui, sans-serif",
          }}
        >
          {tooltip}
        </span>
      )}
    </span>
  );
}
function Slider({ label, unit, value, min, max, step, onChange, theme, tooltipKey }) {
  const tooltip = tooltipKey ? TOOLTIPS[tooltipKey] : null;
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div className="flex flex-col gap-1.5">
      <div className="flex justify-between items-center gap-3">
        <span className="text-[10px] tracking-[0.12em] uppercase font-mono inline-flex items-center min-w-0" style={{ color: theme.textMuted }}>
          {label}
          <InfoIcon tooltip={tooltip} theme={theme} />
        </span>
        <span className="text-[13px] font-mono font-semibold tabular-nums shrink-0 whitespace-nowrap" style={{ color: theme.text }}>
          {value}<span className="ml-1 text-[10px] font-normal" style={{ color: theme.textFaint }}>{unit}</span>
        </span>
      </div>
      <input
        type="range"
        min={min}
        max={max}
        step={step}
        value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        className="w-full"
        style={{
          ['--accent']: theme.accent,
          background: `linear-gradient(90deg, ${theme.accent} 0%, ${theme.accent} ${pct}%, ${theme.surfaceAlt} ${pct}%, ${theme.surfaceAlt} 100%)`,
        }}
      />
    </div>
  );
}
function Stat({ label, value, unit, theme, color, hint, alert, big }) {
  const displayVal = value === null || value === undefined || isNaN(value) || !isFinite(value)
    ? "—"
    : (typeof value === "number" ? (Math.abs(value) >= 100 ? value.toFixed(0) : value.toFixed(1)) : value);
  const c = color || theme.accent;
  return (
    <div
      className="relative flex flex-col rounded-lg px-3 py-2.5 overflow-hidden transition-colors"
      style={{
        background: alert ? theme.alarmSoft : theme.surface,
        border: `1px solid ${alert ? theme.alarm : theme.border}`,
        boxShadow: theme.shadowSoft,
        animation: alert ? "vent-pulse-alarm 1.6s ease-in-out infinite" : "none",
      }}
    >
      {/* accent rail */}
      <span className="absolute left-0 top-0 bottom-0 w-1" style={{ background: alert ? theme.alarm : c, opacity: alert ? 1 : 0.55 }} />
      <div className="flex items-center justify-between">
        <span className="text-[9px] tracking-[0.16em] uppercase font-mono" style={{ color: theme.textFaint }}>{label}</span>
        {alert && <span className="text-[8px] font-mono font-bold uppercase tracking-wider px-1 py-0.5 rounded" style={{ background: theme.alarm, color: "#fff" }}>!</span>}
      </div>
      <div className="flex items-baseline gap-1.5 mt-1">
        <span
          className={`font-mono font-semibold tabular-nums leading-none ${big ? "text-[34px]" : "text-2xl"}`}
          style={{ color: alert ? theme.alarm : (big ? c : theme.text) }}
        >
          {displayVal}
        </span>
        {unit && <span className="text-[10px] font-mono" style={{ color: theme.textFaint }}>{unit}</span>}
      </div>
      {hint && <div className="text-[9px] font-mono mt-1" style={{ color: alert ? theme.alarm : theme.textFaint }}>{hint}</div>}
    </div>
  );
}
function Sparkline({ values, label, unit, color, theme, alertHigh, windowSec }) {
  const W = 280, H = 80, padL = 36, padR = 8, padT = 14, padB = 16;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const valid = values.filter((v) => v !== null && v !== undefined && isFinite(v));
  const hasData = valid.length > 0;
  const min = hasData ? Math.min(...valid) : 0;
  const max = hasData ? Math.max(...valid) : 1;
  const range = Math.max(0.5, max - min);
  const yMin = min - range * 0.15;
  const yMax = max + range * 0.15;
  const current = valid.length > 0 ? valid[valid.length - 1] : null;
  const isAlert = alertHigh !== undefined && current !== null && current > alertHigh;
  const x = (i) => padL + (i / (values.length - 1)) * innerW;
  const y = (v) => padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
  // Build path with breaks at null gaps
  let path = "";
  let inPath = false;
  values.forEach((v, i) => {
    if (v === null || v === undefined || !isFinite(v)) {
      inPath = false;
      return;
    }
    path += `${inPath ? "L" : "M"}${x(i).toFixed(1)},${y(v).toFixed(1)} `;
    inPath = true;
  });
  // Area fill below line
  let area = "";
  if (hasData && path) {
    area = path + `L${x(values.length - 1)},${padT + innerH} L${x(0)},${padT + innerH} Z`;
  }
  return (
    <div className="flex flex-col">
      <div className="flex items-baseline justify-between mb-1 px-1">
        <div className="flex items-baseline gap-2">
          <span className="text-[9px] tracking-[0.18em] uppercase font-mono" style={{ color: theme.textFaint }}>{label}</span>
          {unit && <span className="text-[8px] font-mono" style={{ color: theme.textFaint }}>{unit}</span>}
        </div>
        <span className="text-sm font-mono font-semibold tabular-nums" style={{ color: isAlert ? "#ef4444" : color }}>
          {current !== null ? (Math.abs(current) >= 100 ? current.toFixed(0) : current.toFixed(1)) : "—"}
        </span>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: `${H}px`, background: theme.surface, border: `1px solid ${theme.border}` }}>
        {/* y-axis labels */}
        <text x={padL - 4} y={padT + 4} fontSize="8" textAnchor="end" fill={theme.tickText} fontFamily="ui-monospace, monospace">
          {hasData ? (Math.abs(yMax) >= 100 ? yMax.toFixed(0) : yMax.toFixed(1)) : ""}
        </text>
        <text x={padL - 4} y={padT + innerH} fontSize="8" textAnchor="end" fill={theme.tickText} fontFamily="ui-monospace, monospace">
          {hasData ? (Math.abs(yMin) >= 100 ? yMin.toFixed(0) : yMin.toFixed(1)) : ""}
        </text>
        {/* x-axis label — time window */}
        <text x={padL} y={H - 4} fontSize="7" fill={theme.textFaint} fontFamily="ui-monospace, monospace">
          {windowSec !== undefined && windowSec > 0
            ? (windowSec >= 60 ? `−${(windowSec / 60).toFixed(1)} min` : `−${windowSec.toFixed(0)}s`)
            : `${values.length} breaths ago`}
        </text>
        <text x={W - padR} y={H - 4} fontSize="7" textAnchor="end" fill={theme.textFaint} fontFamily="ui-monospace, monospace">
          now
        </text>
        {/* Area fill */}
        {area && (
          <path d={area} fill={color} opacity="0.12" />
        )}
        {/* Line */}
        {path && (
          <path d={path} fill="none" stroke={color} strokeWidth="1.4" strokeLinejoin="round" strokeLinecap="round" />
        )}
        {/* Last-point dot */}
        {hasData && (
          <circle cx={x(values.length - 1)} cy={y(current)} r="2.5" fill={isAlert ? "#ef4444" : color} />
        )}
        {/* Empty state */}
        {!hasData && (
          <text x={W / 2} y={H / 2} fontSize="9" textAnchor="middle" fill={theme.textFaint} fontFamily="ui-monospace, monospace">
            collecting breaths…
          </text>
        )}
      </svg>
    </div>
  );
}
// ---------- Waveform feature detection ----------
// Scans the most recent breath in the buffer and returns labeled anchor points
// for annotation. Returns { pressure: [...], flow: [...], volume: [...] } where
// each entry is { tSec, value, label, description, kind }.
//
// kind: "primary" (always-show in Style A) | "secondary" (hover-only) | "alarm"
function detectWaveformFeatures(bufferRef, mode, settings) {
  const tBuf = bufferRef.current.t;
  const P = bufferRef.current.P;
  const F = bufferRef.current.F;
  const V = bufferRef.current.V;
  const N = tBuf.length;
  // Build a list of valid (t, P, F, V) samples in time order.
  // Buffer is circular so we sort by t.
  const valid = [];
  for (let i = 0; i < N; i++) {
    if (tBuf[i] === null || tBuf[i] === undefined || isNaN(tBuf[i])) continue;
    valid.push({ t: tBuf[i], P: P[i], F: F[i], V: V[i] });
  }
  valid.sort((a, b) => a.t - b.t);
  if (valid.length < 10) return { pressure: [], flow: [], volume: [] };
  // Find peak pressure (PIP) and its time
  let pipIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].P > valid[pipIdx].P) pipIdx = i;
  }
  const pip = valid[pipIdx];
  // Plateau pressure: pressure ~5 samples after PIP (when flow has decelerated)
  // Only meaningful if mode is PC/PRVC/PS (decelerating flow naturally yields plateau)
  let plat = null;
  if (["PC", "PRVC", "PS", "SIMV-PC"].includes(mode)) {
    const platIdx = Math.min(pipIdx + 8, valid.length - 1);
    plat = valid[platIdx];
  }
  // Peak inspiratory flow (max F)
  let peakInspIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].F > valid[peakInspIdx].F) peakInspIdx = i;
  }
  const peakInsp = valid[peakInspIdx];
  // Peak expiratory flow (most negative F)
  let peakExpIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].F < valid[peakExpIdx].F) peakExpIdx = i;
  }
  const peakExp = valid[peakExpIdx];
  // End-expiratory flow — last sample
  const lastSample = valid[valid.length - 1];
  // Detect auto-PEEP: end-exp flow significantly non-zero at cycle end
  const hasAutoPEEP = Math.abs(lastSample.F) > 5; // L/min
  // Peak volume (Vt)
  let vtIdx = 0;
  for (let i = 0; i < valid.length; i++) {
    if (valid[i].V > valid[vtIdx].V) vtIdx = i;
  }
  const vtPeak = valid[vtIdx];
  // PEEP baseline — use settings, anchor at last sample's time
  const peepValue = mode === "APRV" ? settings.aprvPlow : settings.PEEP;
  // ---- Build annotation lists ----
  const pressure = [
    {
      tSec: pip.t, value: pip.P, label: "PIP",
      description: "Peak inspiratory pressure — highest airway pressure during inspiration. Includes both elastic recoil and resistive components. Alarm if >35 cmH₂O.",
      kind: pip.P > 35 ? "alarm" : "primary",
    },
  ];
  if (plat) {
    pressure.push({
      tSec: plat.t, value: plat.P, label: "P-plat",
      description: "Plateau pressure — static recoil pressure of the lung at end-inspiration when flow is zero. Reflects elastic loading only. Target ≤30 cmH₂O in ARDS.",
      kind: plat.P > 30 ? "alarm" : "primary",
    });
  }
  pressure.push({
    tSec: lastSample.t, value: peepValue, label: "PEEP",
    description: "Positive end-expiratory pressure — pressure maintained at end of expiration to prevent alveolar collapse.",
    kind: "secondary",
  });
  const flow = [
    {
      tSec: peakInsp.t, value: peakInsp.F, label: "Peak insp",
      description: "Peak inspiratory flow rate. In VC this equals the set flow (square wave). In PC/PS it's highest at start of inspiration and decelerates.",
      kind: "primary",
    },
    {
      tSec: peakExp.t, value: peakExp.F, label: "Peak exp",
      description: "Peak expiratory flow rate (most negative). Driven by elastic recoil; magnitude depends on tidal volume and time constant.",
      kind: "primary",
    },
  ];
  if (hasAutoPEEP) {
    flow.push({
      tSec: lastSample.t, value: lastSample.F, label: "Flow ≠ 0",
      description: "End-expiratory flow has not returned to zero — incomplete exhalation suggests auto-PEEP / gas trapping. Common in COPD or with insufficient expiratory time.",
      kind: "alarm",
    });
  }
  const volume = [
    {
      tSec: vtPeak.t, value: vtPeak.V, label: "Vt",
      description: "Tidal volume — peak volume delivered each breath. Target 6 mL/kg ideal body weight in ARDS for lung-protective ventilation.",
      kind: "primary",
    },
  ];
  return { pressure, flow, volume };
}
// Renders the current frame of all three plots as a single composite PNG.
// Uses 2× DPR scaling for retina-quality output.
function exportWaveformsToPng({ bufferRef, sweepRef, theme, mode, windowSec, Pmax, Fabs, Vmax, settings, measurements }) {
  const SCALE = 2;
  const W = 720, plotH = 170; // taller than live plots to give annotations breathing room
  const headerH = 60, footerH = 80;
  const totalH = headerH + plotH * 3 + footerH;
  const canvas = document.createElement("canvas");
  canvas.width = W * SCALE;
  canvas.height = totalH * SCALE;
  const ctx = canvas.getContext("2d");
  ctx.scale(SCALE, SCALE);
  // Background
  ctx.fillStyle = theme.surface;
  ctx.fillRect(0, 0, W, totalH);
  // Header text
  ctx.fillStyle = theme.text;
  ctx.font = "700 15px 'Hanken Grotesk', system-ui, sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("Ventilator Waveforms", 16, 24);
  ctx.fillStyle = theme.textMuted;
  ctx.font = "10px ui-monospace, monospace";
  const stamp = new Date().toLocaleString();
  ctx.fillText(`Mode: ${mode} · ${stamp}`, 16, 42);
  ctx.textAlign = "right";
  if (measurements) {
    ctx.fillText(
      `PIP ${measurements.PIP?.toFixed(0) ?? "—"} · Vt ${measurements.VtExp?.toFixed(0) ?? "—"} mL · MV ${measurements.MV?.toFixed(1) ?? "—"} L/min`,
      W - 16, 42
    );
  }
  // Detect features for Style A annotations
  const features = detectWaveformFeatures(bufferRef, mode, settings || {});
  // Draw each plot
  const channels = [
    { ch: "P", color: theme.scope.pressure, label: "PRESSURE  cmH₂O", yMin: 0, yMax: Pmax, anns: features.pressure },
    { ch: "F", color: theme.scope.flow, label: "FLOW  L/min", yMin: -Fabs, yMax: Fabs, anns: features.flow },
    { ch: "V", color: theme.scope.volume, label: "VOLUME  mL", yMin: 0, yMax: Vmax, anns: features.volume },
  ];
  channels.forEach((cfg, i) => {
    const yOffset = headerH + i * plotH;
    drawPlotFrame(ctx, {
      x: 0, y: yOffset, W, H: plotH,
      bufferRef, sweepRef,
      channel: cfg.ch, color: cfg.color, yLabel: cfg.label,
      yMin: cfg.yMin, yMax: cfg.yMax,
      theme, windowSec,
      annotations: cfg.anns,
    });
  });
  // Footer with settings summary
  const footerY = headerH + plotH * 3 + 18;
  ctx.fillStyle = theme.textFaint;
  ctx.font = "9px ui-monospace, monospace";
  ctx.textAlign = "left";
  if (settings) {
    const lines = [
      mode === "APRV"
        ? `P-high ${settings.aprvPhigh} · P-low ${settings.aprvPlow} · T-high ${settings.aprvThigh}s · T-low ${settings.aprvTlow}s`
        : `Vt ${settings.Vt} mL · RR ${settings.RR} · I-time ${settings.ITime}s · PEEP ${settings.PEEP} · PIP ${settings.PIP}`,
      `Compliance ${settings.C} L/cmH₂O · Resistance ${settings.R} cmH₂O/L/s · ${settings.pathology !== "none" ? `Scenario: ${settings.pathology}` : "Normal mechanics"}`,
      "Educational use — single-compartment lung model",
    ];
    lines.forEach((line, i) => {
      ctx.fillText(line, 16, footerY + i * 14);
    });
  }
  // Trigger download
  canvas.toBlob((blob) => {
    if (!blob) return;
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const filename = `vent-waveform-${mode}-${Date.now()}.png`;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, "image/png");
}
// Pure drawing function — used by both export and (eventually) live plots.
// If `annotations` is passed, renders Style A inline tick labels.
function drawPlotFrame(ctx, { x, y, W, H, bufferRef, sweepRef, channel, color, yLabel, yMin, yMax, theme, windowSec, annotations }) {
  const padL = 60, padR = 12, padT = 30, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const xCoord = (t) => x + padL + (t / windowSec) * innerW;
  const yCoord = (v) => y + padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
  const sc = theme.scope;
  // Background
  ctx.fillStyle = sc.surface;
  ctx.fillRect(x, y, W, H);
  // Grid
  ctx.strokeStyle = sc.grid;
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const yy = y + padT + (innerH * i) / 4;
    ctx.beginPath(); ctx.moveTo(x + padL, yy); ctx.lineTo(x + W - padR, yy); ctx.stroke();
  }
  const xTicks = Math.floor(windowSec);
  for (let i = 0; i <= xTicks; i++) {
    const xx = x + padL + (innerW * i) / xTicks;
    ctx.beginPath(); ctx.moveTo(xx, y + padT); ctx.lineTo(xx, y + H - padB); ctx.stroke();
  }
  ctx.strokeStyle = sc.gridStrong;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + padL, y + padT, innerW, innerH);
  // Zero line
  if (yMin < 0 && yMax > 0) {
    const zy = yCoord(0);
    ctx.strokeStyle = sc.zeroLine;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(x + padL, zy); ctx.lineTo(x + W - padR, zy); ctx.stroke();
    ctx.setLineDash([]);
  }
  // Y tick labels
  ctx.fillStyle = sc.tick;
  ctx.font = "9px var(--font-mono), ui-monospace, monospace";
  ctx.textAlign = "end";
  for (let i = 0; i <= 4; i++) {
    const v = yMin + ((yMax - yMin) * (4 - i)) / 4;
    const yy = y + padT + (innerH * i) / 4;
    ctx.fillText(Math.round(v), x + padL - 6, yy + 3);
  }
  ctx.textAlign = "center";
  for (let i = 0; i <= xTicks; i++) {
    const xx = x + padL + (innerW * i) / xTicks;
    ctx.fillText(`${i}s`, xx, y + H - 6);
  }
  // Channel label
  ctx.fillStyle = color;
  ctx.font = "bold 10px ui-monospace, monospace";
  ctx.textAlign = "left";
  ctx.fillText(yLabel, x + padL, y + 18);
  // Trace
  const tBuf = bufferRef.current.t;
  const series = bufferRef.current[channel];
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.6;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  ctx.beginPath();
  let started = false;
  let prevX = -1;
  for (let i = 0; i < tBuf.length; i++) {
    const tv = tBuf[i];
    if (tv === null || tv === undefined || isNaN(tv)) continue;
    const xx = xCoord(tv);
    const yy = yCoord(series[i]);
    if (started && xx < prevX - 5) {
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(xx, yy);
    } else if (!started) {
      ctx.moveTo(xx, yy);
      started = true;
    } else {
      ctx.lineTo(xx, yy);
    }
    prevX = xx;
  }
  ctx.stroke();
  // ---- Style A annotations ----
  // Place each annotation with leader line + label box, stacked vertically
  // to prevent overlap. Layout strategy:
  //   - Anchor dot at (xCoord(tSec), yCoord(value))
  //   - Label sits to the right of anchor by default; flips left if no room
  //   - If multiple labels would collide vertically, stack with min 14px spacing
  if (annotations && annotations.length > 0) {
    const labelH = 13;
    const labelGap = 3; // gap between stacked labels
    // Sort by y-coordinate so we stack from top to bottom predictably
    const sorted = [...annotations]
      .map(a => ({ ...a, _x: xCoord(a.tSec), _y: yCoord(a.value) }))
      .sort((a, b) => a._y - b._y);
    const placed = []; // tracks { left, top, right, bottom } of placed labels
    for (const a of sorted) {
      // Format the value
      const valStr = typeof a.value === "number"
        ? (Math.abs(a.value) >= 100 ? a.value.toFixed(0) : a.value.toFixed(1))
        : String(a.value);
      const text = `${a.label} ${valStr}`;
      ctx.font = "bold 9px ui-monospace, monospace";
      const textW = ctx.measureText(text).width;

      const label = which === "insp" ? "P-plat" : "Total PEEP";
      setHoldResult({ type: which, value: captured, label });
      // Update measurements panel with hold-derived values
      if (captured !== null && captured !== undefined) {
        const m = measurementsRef.current;
        if (which === "insp") {
          // Cstat = Vt / (Pplat - PEEP)
          const Cstat = m.VtExp / Math.max(0.1, captured - PEEP);
          // Raw = (PIP − Pplat)/flow is only valid with constant inspiratory flow (VC).
          const isConstFlow = mode === "VC" || mode === "SIMV-VC";
          const Raw = (isConstFlow && m.peakInspFlow > 0)
            ? (m.PIP - captured) / (m.peakInspFlow / 60) : m.Raw;
          const next = { ...m, Pplat: captured, Cstat, Raw };
          measurementsRef.current = next;
          setMeasurements(next);
        } else {
          // exp hold reveals total PEEP — auto-PEEP component is captured separately
          // Already shown in holdResult; no need to change panel
        }
      }
      holdRef.current = { mode: null, startedAt: null };
      setHoldMode(null);
    }, totalHoldMs);

              <button onClick={() => setPaused(!paused)} className={pill}

                <Stat label="Raw" value={measurements.Raw} unit="cmH₂O/L/s" theme={theme} color={theme.accent} hint={measurements.Cstat ? "from hold" : "estimate"} alert={measurements.Raw > 20} />

                <Slider label="Compliance" unit="L/cmH₂O" value={C} min={0.015} max={0.10} step={0.005} onChange={setC} theme={theme} tooltipKey="C" />
                <Slider label="Resistance" unit="cmH₂O/L/s" value={R} min={5} max={30} step={1} onChange={setR} theme={theme} tooltipKey="R" />
              </div>
            </div>
            {/* Maneuvers */}
            <div className="rounded-2xl p-4" style={railCardStyle}>
              <div className="mb-3"><SectionLabel text="Maneuvers" sub="hold 2s · auto-release" /></div>
              <div className="flex flex-wrap gap-2">
                <button onClick={() => triggerHold("insp")}
                  className="sim-touch-target px-4 py-2 text-[11px] font-mono tracking-widest uppercase rounded-lg border transition-all"
                  style={{ background: holdMode === "insp" ? theme.accent : "transparent", color: holdMode === "insp" ? theme.accentInk : theme.text, borderColor: holdMode === "insp" ? theme.accent : theme.border }}>
                  Inspiratory Hold
                </button>
                <button onClick={() => triggerHold("exp")}
                  className="sim-touch-target px-4 py-2 text-[11px] font-mono tracking-widest uppercase rounded-lg border transition-all"
                  style={{ background: holdMode === "exp" ? theme.accent : "transparent", color: holdMode === "exp" ? theme.accentInk : theme.text, borderColor: holdMode === "exp" ? theme.accent : theme.border }}>
                  Expiratory Hold
                </button>
              </div>
              {holdResult && (
                <div className="text-[11px] font-mono mt-3 px-3 py-2 rounded-lg" style={{ color: theme.text, background: theme.surfaceAlt, border: `1px solid ${theme.border}` }}>
                  <span style={{ color: theme.textFaint }}>{holdResult.label}:</span>{" "}
                  <span style={{ color: theme.accent, fontWeight: 700 }}>{holdResult.value !== null && holdResult.value !== undefined ? holdResult.value.toFixed(1) : "—"}</span>{" "}
                  <span style={{ color: theme.textFaint }}>cmH₂O</span>
                  {holdResult.type === "insp" && holdResult.value !== null && (
                    <span style={{ color: theme.textFaint }}> · ΔP = {(holdResult.value - PEEP).toFixed(1)} · Cstat = {((Vt) / Math.max(0.1, holdResult.value - PEEP)).toFixed(1)}</span>
                  )}
                  {holdResult.type === "exp" && holdResult.value !== null && (
                    <span style={{ color: theme.textFaint }}> · auto-PEEP = {(holdResult.value - PEEP).toFixed(1)}</span>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
        {/* Trends */}
        {(() => {
          const effectiveRR = measurements.measuredRR > 0 ? measurements.measuredRR : RR;
          const validBreaths = trends.PIP.filter(v => v !== null).length;
          const trendWindowSec = validBreaths > 0 ? (validBreaths * 60) / effectiveRR : 0;
          const windowLabel = trendWindowSec >= 60 ? `~${(trendWindowSec / 60).toFixed(1)} min` : `~${trendWindowSec.toFixed(0)}s`;
          return (
            <div className="mt-5 rounded-2xl overflow-hidden" style={cardStyle}>
              <div className="flex items-center justify-between px-4 py-3" style={{ borderBottom: `1px solid ${theme.border}`, background: theme.surfaceAlt }}>
                <SectionLabel text="Trends" sub={`last ${validBreaths} of ${TRENDS_LEN} breaths · ${windowLabel}`} />
                <span className="text-[9px] font-mono" style={{ color: theme.textFaint }}>auto-scaled</span>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 p-3">
                <Sparkline values={trends.PIP} label="PIP" unit="cmH₂O" color={theme.pressure} theme={theme} alertHigh={35} windowSec={trendWindowSec} />
                <Sparkline values={trends.Pmean} label="Mean Paw" unit="cmH₂O" color={theme.pressure} theme={theme} windowSec={trendWindowSec} />
                <Sparkline values={trends.VtExp} label="Vt exp" unit="mL" color={theme.volume} theme={theme} windowSec={trendWindowSec} />
                <Sparkline values={trends.Cdyn} label="Cdyn" unit="mL/cmH₂O" color={theme.accent} theme={theme} windowSec={trendWindowSec} />
              </div>
            </div>
          );
        })()}
        {/* Disclaimer — robust, consistent with the teaching reference */}
        <aside className="mt-6 rounded-2xl overflow-hidden" aria-label="Educational disclaimer"
               style={{ background: theme.surface, border: `1px solid ${theme.border}`, borderLeft: `4px solid ${theme.pressure}`, boxShadow: theme.shadowSoft }}>
          <div className="px-4 sm:px-5 py-4">
            <div className="text-[10px] tracking-[0.18em] uppercase font-mono font-bold mb-2" style={{ color: theme.pressure }}>
              Disclaimer · Educational use only
            </div>
            <p className="text-[12.5px] font-sans leading-relaxed" style={{ color: theme.textMuted }}>
              This is a teaching simulator. It renders an <strong style={{ color: theme.text }}>idealized single-compartment lung model</strong>, and every waveform and number it reports — PIP, plateau, mean and driving pressure, compliance, resistance, auto-PEEP, minute ventilation, and the rest — is a simplified illustration generated by that model. <strong style={{ color: theme.text }}>It is not patient data and not the output of any real ventilator.</strong> It does not constitute medical advice and is not a substitute for clinical judgment, hands-on training on the actual device, institutional protocols, or the care of a qualified clinician at the bedside.
            </p>
            <p className="text-[12.5px] font-sans leading-relaxed mt-2" style={{ color: theme.textMuted }}>
              Real patients and ventilators are far more complex than this model — manufacturer- and mode-specific behavior, multi-compartment and nonlinear mechanics, leaks, secretions, circuit factors, and patient effort all differ from what is shown here. The dyssynchrony and pathology scenarios are stylized to make a pattern recognizable, not to reproduce a specific clinical case. <strong style={{ color: theme.text }}>Use it to build intuition and recognize patterns — never to make, guide, or justify a patient-care decision.</strong> Verify anything clinically actionable against primary sources, current guidelines, and your institution's standards.
            </p>
            <p className="text-[11px] font-mono leading-relaxed mt-3 pt-3" style={{ color: theme.textFaint, borderTop: `1px solid ${theme.border}` }}>
              Model detail · single-compartment equation of motion, P<sub>aw</sub> = V/C + Flow·R + PEEP. Inspiratory hold estimates plateau pressure / static compliance; expiratory hold estimates total PEEP (intrinsic PEEP). No liability is accepted for use of this material.
            </p>
          </div>
        </aside>
      </div>
    </div>
  );
}
    // Mount
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(VentilatorWaveforms)
    );
  </script>
  <script>
    // Height-sync for iframe embedding — posts document height to parent so
    // the embedding page can size the iframe to fit content exactly. No-op
    // when this page is loaded standalone (window.parent === window).
    //
    // Subtlety: the React root uses Tailwind's min-h-screen (min-height:100vh).
    // Inside an iframe, 100vh == iframe height, so body.scrollHeight tracks the
    // iframe size and creates a positive feedback loop (iframe grows -> root
    // grows -> postHeight reports a bigger number -> iframe grows again).
    // We temporarily neutralize any min-height >= 90% of viewport height while
    // measuring, then restore the original inline value.
    (function(){
      // Measure content height by finding the maximum bottom-edge of any
      // visible LEAF element (no element children) in the page. Leaves are
      // never inflated by min-height: 100vh on their children — they only
      // occupy the space their own content needs. The deepest visible leaf
      // (typically the footer text) reflects the true content end.
      //
      // Why this matters: the React root has Tailwind's min-h-screen, so its
      // bounding box stretches to fill the iframe viewport. So does its
      // parent <div id="root">. Measuring either of their bottoms gives us
      // the iframe height back, creating a feedback loop. Leaves never have
      // children, so they're immune to this.
      function measureContentHeight() {
        let maxBottom = 0;
        const all = document.body.getElementsByTagName('*');
        for (let i = 0; i < all.length; i++) {
          const el = all[i];
          if (el.children && el.children.length > 0) continue; // not a leaf
          const tag = el.tagName;
          if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'LINK' || tag === 'META') continue;
          const cs = window.getComputedStyle(el);
          if (cs.display === 'none' || cs.visibility === 'hidden') continue;
          const rect = el.getBoundingClientRect();
          // Ignore zero-size and off-screen-left elements (positioned outside viewport)
          if (rect.width <= 0 && rect.height <= 0) continue;
          const bottom = rect.bottom + (window.scrollY || window.pageYOffset || 0);
          if (bottom > maxBottom) maxBottom = bottom;
        }
        return Math.ceil(maxBottom);
      }
      function postHeight() {
        try {
          const h = measureContentHeight();
          if (h > 0 && window.parent && window.parent !== window) {
            window.parent.postMessage({ type: 'vent-sim-height', height: h }, '*');
          }
        } catch (e) {}
      }
      window.addEventListener('load', postHeight);
      window.addEventListener('resize', postHeight);
      if (typeof ResizeObserver !== 'undefined' && document.body) {
        const ro = new ResizeObserver(postHeight);
        ro.observe(document.body);
      }
      // React + Babel compile late — catch the render and any post-mount layout shifts
      setTimeout(postHeight, 200);
      setTimeout(postHeight, 800);
      setTimeout(postHeight, 2000);
      setTimeout(postHeight, 4000);
    })();
  </script>
