    :root {

    }
    /* Match the book: no horizontal swipe-back / overscroll on mobile */
    html { overscroll-behavior-x: none; }
    /* ===== Embedded mode (iframe inside the teaching reference) =====
       The host sizes the iframe to our scrollHeight. Any 100vh rule then
       resolves against the iframe's own height, which makes scrollHeight
       self-referential and lets the iframe creep taller on every message.
       When embedded we drop the viewport-relative sizing and let the page
       flow to its natural content height instead. */
    html.is-embedded,
    html.is-embedded body,
    html.is-embedded #root { min-height: 0 !important; height: auto !important; }
    html.is-embedded .min-h-screen { min-height: 0 !important; }
    html.is-embedded .v2-panel-scroll { max-height: none !important; overflow: visible !important; }
    body { margin: 0; font-family: var(--font-body); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    /* Route every existing Tailwind/inline mono + serif usage through the new type system */
    .font-mono { font-family: var(--font-mono) !important; }
    .font-sans { font-family: var(--font-body) !important; }
    .font-display { font-family: var(--font-display) !important; letter-spacing: -0.02em; }
    /* Custom range slider styling — themed via currentColor of the accent */
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 5px; border-radius: 999px; background: rgba(120,130,150,0.25); outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 15px; height: 15px; border-radius: 50%; background: var(--accent, #0d9488); border: 2px solid #fff; box-shadow: 0 1px 3px rgba(15,23,42,0.3); cursor: pointer; transition: transform .12s ease; }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.18); }
    input[type="range"]::-moz-range-thumb { width: 15px; height: 15px; border-radius: 50%; background: var(--accent, #0d9488); border: 2px solid #fff; box-shadow: 0 1px 3px rgba(15,23,42,0.3); cursor: pointer; }

    @media (max-width: 700px) {

    .v2-control-rail,.v2-patient-rail{font-size:13px}
    .v2-control-rail p,.v2-patient-rail p{line-height:1.55}
    .v2-bottom-drawer button,.v2-full-review button{white-space:normal}
    @media(max-width:760px){
      body{font-size:14px}
      .text-\[34px\]{font-size:26px!important}
      .ui-monitor-values b{font-size:17px!important}
      .sim-touch-target{min-height:42px}
    }

    @media(max-width:760px){
      .v2-bottom-drawer{position:static!important;bottom:auto!important;max-height:none!important;margin-bottom:88px!important}
      .ui-quick-controls>div{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px!important;overflow:visible!important}
      .ui-quick-controls>div>span:first-child{grid-column:1/-1;margin-bottom:2px}
      .ui-quick-controls>div>div{width:100%;min-width:0!important}
      .ui-quick-controls>div>div button{flex:0 0 30px}
      .ui-quick-controls>div>div>div{min-width:0!important}
      .v2-main-monitor{padding-bottom:12px}
      header h1{white-space:normal!important;overflow:visible!important;text-overflow:clip!important;font-size:20px!important;line-height:1.15!important}

    /* ===== v2.11 patient panel + pause/resume cleanup ===== */
    .patient-overview-card .patient-field-label{font:500 10px/1.25 var(--font-mono);letter-spacing:.06em;text-transform:uppercase;color:inherit;opacity:.72}
    .patient-overview-card .patient-field-value{font:600 13px/1.3 var(--font-mono);overflow-wrap:anywhere}
    .patient-overview-card .patient-phys-card{min-width:0;padding:10px 11px;border-radius:10px}
    .patient-overview-card .patient-phys-label{font:500 9px/1.2 var(--font-mono);letter-spacing:.08em;text-transform:uppercase}
    .patient-overview-card .patient-phys-value{margin-top:3px;font:650 20px/1.05 var(--font-mono)}
    .resp-monitor-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .resp-monitor-card{min-width:0;padding:10px;border-radius:10px}
    .resp-monitor-card .metric-label{font:600 10px/1.2 var(--font-mono);letter-spacing:.06em;text-transform:uppercase}
    .resp-monitor-card .metric-value{margin-top:5px;font:650 19px/1.05 var(--font-mono);overflow-wrap:anywhere}
    .resp-monitor-card .metric-unit{font:500 9px/1.2 var(--font-mono)}
    .resp-monitor-card .validity-badge{margin-top:7px;font-size:8.5px!important;line-height:1.15!important;padding:2px 5px!important;letter-spacing:.04em!important;white-space:nowrap!important}
    .paused-resume-button{cursor:pointer;user-select:none}
    .paused-resume-button:focus-visible{outline:2px solid #fff;outline-offset:2px}
    @media(max-width:420px){.resp-monitor-grid{grid-template-columns:1fr 1fr}.patient-overview-card .patient-phys-value{font-size:18px}.resp-monitor-card .metric-value{font-size:17px}}

    /* ===== v2.19 spacious procedure drawer ===== */
    .sim-speed-control{display:inline-flex;align-items:center;gap:2px;padding:3px;border-radius:999px;min-height:42px}
    .sim-speed-control button{min-width:34px;min-height:34px;padding:0 9px;border-radius:999px;font:600 10px var(--font-mono);line-height:1;white-space:nowrap}
    .procedure-drawer{min-width:0;max-width:100%;overflow:hidden;box-sizing:border-box;padding:28px!important}
    .procedure-drawer .procedure-header{min-width:0;padding:0 3px 18px;margin-bottom:20px;border-bottom:1px solid rgba(148,163,184,.18)}
    .procedure-drawer .procedure-header>div{max-width:100%}
    .procedure-drawer .procedure-action{width:100%;min-width:0;min-height:62px;padding:13px 14px!important;white-space:normal;overflow-wrap:anywhere;word-break:normal;hyphens:auto;line-height:1.35;text-align:center;display:flex;align-items:center;justify-content:center}
    .procedure-drawer .procedure-message{display:flex;align-items:flex-start;gap:10px;max-width:100%;padding:13px 15px!important;overflow-wrap:anywhere;word-break:normal;line-height:1.5}
    .procedure-drawer .procedure-message::before{content:"";width:8px;height:8px;border-radius:999px;flex:0 0 8px;margin-top:.42em;background:#34d399;box-shadow:0 0 8px rgba(52,211,153,.65)}
    .procedure-drawer .procedure-sensor-row{min-width:0;padding:14px 15px;border-radius:12px}
    .procedure-drawer .procedure-sensor-row>button{flex:1 1 210px;min-width:0;max-width:100%;white-space:normal;text-align:center;line-height:1.3;overflow-wrap:anywhere;padding:10px 14px!important}
    .procedure-drawer .procedure-abg{max-width:100%;padding:13px 15px;border-radius:12px;overflow-wrap:anywhere;word-break:normal;line-height:1.5}
    @media(min-width:761px){

      .v2-main-monitor{display:contents}
      .v2-main-monitor>.v2-live-scope{grid-column:1/-1;grid-row:1;min-width:0;margin-bottom:0}

            ctx.textAlign = "left";
